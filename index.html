<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="medium">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>101 C & C++ Programs - Ultimate Edition</title>

<!-- Syntax Highlighting Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/cpp.min.js"></script>

<style>
  /* =======================================================
     THEME VARIABLES (LIGHT & DARK MODE)
     ======================================================= */
  :root {
    --bg-main: #f0f4f8;
    --card-bg: #ffffff;
    --card-header: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #475569;
    --border-color: #cbd5e1;
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
    --shadow-hover: 0 10px 30px rgba(0, 0, 0, 0.15);
    --code-bg: #f8fafc;
    --code-text: #1e293b;
    --pat-bg: #e2e8f0;
    
    --hl-keyword: #d73a49;
    --hl-string: #032f62;
    --hl-number: #005cc5;
    --hl-meta: #6a737d;
    --hl-func: #6f42c1;
    
    --fab-bg: #1e293b;
    --fab-text: #ffffff;
    --btn-primary: #007acc;
  }

  [data-theme="dark"] {
    --bg-main: #0f172a;
    --card-bg: #1e293b;
    --card-header: #162032;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.4);
    --shadow-hover: 0 10px 30px rgba(0, 0, 0, 0.6);
    --code-bg: #0f172a;
    --code-text: #e2e8f0;
    --pat-bg: #111827;
    
    --hl-keyword: #ff7b72;
    --hl-string: #a5d6ff;
    --hl-number: #79c0ff;
    --hl-meta: #8b949e;
    --hl-func: #d2a8ff;
    
    --fab-bg: #38bdf8;
    --fab-text: #0f172a;
    --btn-primary: #38bdf8;
  }

  /* =======================================================
     DYNAMIC FONT SCALING (Smart Clamp Function)
     ======================================================= */
  [data-font="small"] { --code-font-size: clamp(10px, min(3vw, 1.6vh), 14px); --pat-font-size: clamp(10px, 1.5vh, 14px); }[data-font="medium"] { --code-font-size: clamp(13px, min(3.5vw, 2vh), 18px); --pat-font-size: clamp(12px, 1.8vh, 16px); }
  [data-font="large"] { --code-font-size: clamp(16px, min(4.5vw, 2.5vh), 26px); --pat-font-size: clamp(14px, 2.2vh, 20px); }

  /* =======================================================
     CORE LAYOUT
     ======================================================= */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-main); color: var(--text-main);
    width: 100vw; height: 100dvh;
    overflow: hidden; /* App-like constraints */
    transition: background-color 0.3s, color 0.3s;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  /* =======================================================
     HOME SCREEN (3 BUTTONS)
     ======================================================= */
  #home-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; width: 100vw; padding: 20px;
    background: var(--bg-main); position: absolute; top: 0; left: 0; z-index: 50;
  }
  
  .home-title { font-size: clamp(28px, 6vw, 48px); font-weight: 800; margin-bottom: 5px; text-align: center; }
  .home-subtitle { font-size: clamp(16px, 3vw, 20px); color: var(--text-muted); margin-bottom: 40px; text-align: center; }

  .btn-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
    width: 100%; max-width: 500px;
  }

  .main-btn {
    background: var(--card-bg); color: var(--text-main);
    border: 2px solid var(--border-color); border-radius: 16px;
    padding: 25px 10px; font-size: clamp(18px, 4vw, 24px); font-weight: 800;
    cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  
  .main-btn.full-width { grid-column: span 2; background: var(--btn-primary); color: #fff; border: none; }
  .main-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--btn-primary); }
  .main-btn:active { transform: translateY(2px) scale(0.98); }
  .main-btn .icon { font-size: 32px; }

  /* =======================================================
     IDE APP SCREEN & SNAP SCROLLING
     ======================================================= */
  #app-screen {
    display: none; height: 100dvh; width: 100vw;
    overflow-y: auto; scroll-snap-type: y mandatory; scroll-behavior: smooth;
  }

  .snap-section {
    width: 100vw; height: 100dvh;
    scroll-snap-align: start; scroll-snap-stop: always;
    display: flex; flex-direction: column; padding: 3vh 4vw;
  }

  @media (min-width: 768px) { .snap-section { padding: 4vh 5vw; } }

  .card {
    flex-grow: 1; display: flex; flex-direction: column;
    background: var(--card-bg); border: 1px solid var(--border-color);
    border-radius: 12px; box-shadow: var(--shadow-soft); overflow: hidden;
    max-height: 100%; width: 100%; max-width: 1400px; margin: 0 auto;
  }

  header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card-header); border-bottom: 1px solid var(--border-color);
    padding: 1.5vh 20px; flex-shrink: 0;
  }

  .title { font-size: clamp(15px, 2.2vh, 20px); font-weight: 800; color: var(--text-main); }

  /* Pattern Box */
  .pattern-box {
    background: var(--pat-bg); color: var(--text-muted);
    font-family: "JetBrains Mono", Consolas, monospace; font-size: var(--pat-font-size);
    padding: 1.5vh 0; text-align: center; border-bottom: 1px dashed var(--border-color);
    white-space: pre; line-height: 1.2; flex-shrink: 0; transition: font-size 0.3s;
  }

  /* =======================================================
     CODE VIEWS (SINGLE & SIDE-BY-SIDE)
     ======================================================= */
  .view-container { display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; }
  
  .code-pane {
    flex: 1 1 100%; display: flex; flex-direction: column; min-width: 0;
    border-right: 1px solid var(--border-color);
  }
  .code-pane:last-child { border-right: none; }

  .pane-header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--pat-bg); padding: 6px 15px; border-bottom: 1px solid var(--border-color);
    font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
  }

  .code-area {
    flex-grow: 1; overflow: auto; background: var(--code-bg); padding: 2vh 3vw;
  }

  code {
    font-family: "JetBrains Mono", Consolas, monospace; font-size: var(--code-font-size) !important;
    line-height: 1.5; color: var(--code-text); white-space: pre; transition: font-size 0.3s;
  }

  /* Highlight.js Mappings */
  .hljs { background: transparent; }
  .hljs-keyword, .hljs-type, .hljs-literal { color: var(--hl-keyword); font-weight: bold; }
  .hljs-string { color: var(--hl-string); }
  .hljs-number { color: var(--hl-number); }
  .hljs-comment { color: var(--hl-meta); font-style: italic; }
  .hljs-meta { color: var(--hl-meta); font-weight: bold; }
  .hljs-built_in, .hljs-title { color: var(--hl-func); }

  /* =======================================================
     COPY BUTTON
     ======================================================= */
  .copy-btn {
    background-color: #10b981; color: white; font-weight: 700; font-size: 12px;
    padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); transition: all 0.2s;
  }
  .copy-btn:hover { background-color: #059669; transform: translateY(-2px); }
  .copy-btn.success { background-color: #3b82f6; }

  /* =======================================================
     FLOATING ACTIONS & MENU
     ======================================================= */
  .fab-container { position: fixed; bottom: 4vh; right: 4vw; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
  .fab {
    width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--fab-bg); color: var(--fab-text);
    font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25); cursor: pointer; transition: transform 0.2s;
  }
  .fab:active { transform: scale(0.9); }
  
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 98; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(2px); }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .sheet {
    position: fixed; bottom: -100%; left: 0; width: 100vw; height: 80dvh;
    background: var(--card-bg); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
    transition: bottom 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 101; display: flex; flex-direction: column;
  }
  @media (min-width: 768px) { .sheet { width: 50vw; left: 25vw; height: 70vh; border-radius: 24px; bottom: -100%; top: 15vh; transform: translateY(150%); transition: transform 0.4s; } .sheet.show { transform: translateY(0); } }
  .sheet.show { bottom: 0; }
  
  .s-head { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid var(--border-color); }
  .s-head h3 { font-size: 20px; color: var(--text-main); font-weight: 700; }
  .s-close { background: transparent; border: none; font-size: 28px; color: var(--text-muted); cursor: pointer; }
  
  .s-list { flex-grow: 1; overflow-y: auto; list-style: none; }
  .s-list li { padding: 15px 25px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-weight: 600; cursor: pointer; }
  .s-list li:active { background: var(--pat-bg); }

  .intro { align-items: center; justify-content: center; text-align: center; }
  .intro h1 { font-size: clamp(30px, 8vw, 60px); color: var(--text-main); margin-bottom: 10px; }
  .bounce { margin-top: 30px; font-size: 40px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen">
  <div class="home-title">Programming Collection</div>
  <div class="home-subtitle">101 Essential Algorithms & Patterns</div>
  
  <div class="btn-grid">
    <button class="main-btn" onclick="openMode('C')">
      <span class="icon">📘</span> C Programs
    </button>
    <button class="main-btn" onclick="openMode('CPP')">
      <span class="icon">📙</span> C++ Programs
    </button>
    <button class="main-btn full-width" onclick="openMode('BOTH')">
      <span class="icon">⚖️</span> Both Side-by-Side
    </button>
  </div>
</div>

<!-- IDE APP SCREEN -->
<div id="app-screen">
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="fab-container">
    <button class="fab" onclick="goHome()" title="Home">🏠</button>
    <button class="fab" id="fontBtn" onclick="toggleFontSize()" title="Change Font Size">Aa</button>
    <button class="fab" id="themeBtn" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
    <button class="fab" onclick="toggleMenu()" title="Quick Navigation">☰</button>
  </div>

  <div class="sheet" id="sheet">
    <div class="s-head">
      <h3 id="sheetTitle">Quick Jump</h3>
      <button class="s-close" onclick="toggleMenu()">&times;</button>
    </div>
    <ul class="s-list" id="menuList"></ul>
  </div>

  <div id="programs-container"></div>
</div>

<script>
// =======================================================

const data = [["1. CALCULATOR - SUM SUB MUL DIV", "", `#include <stdio.h>\nint main() {\n    float a, b;\n    printf("Enter two numbers: ");\n    scanf("%f %f", &a, &b);\n    printf("Sum            = %.2f\\n", a + b);\n    printf("Subtraction    = %.2f\\n", a - b);\n    printf("Multiplication = %.2f\\n", a * b);\n    if (b != 0)\n        printf("Division       = %.2f\\n", a / b);\n    else\n        printf("Division       = Infinity\\n");\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    float a, b;\n    cout << "Enter two numbers: ";\n    cin >> a >> b;\n    cout << "Sum            = " << a + b << endl;\n    cout << "Subtraction    = " << a - b << endl;\n    cout << "Multiplication = " << a * b << endl;\n    if (b != 0)\n        cout << "Division       = " << a / b << endl;\n    else\n        cout << "Division       = Infinity" << endl;\n    return 0;\n}`],["2a. LARGEST AMONG 3 NUMBERS", "", `#include <stdio.h>\nint main() {\n    int a, b, c;\n    printf("Enter three numbers: ");\n    scanf("%d %d %d", &a, &b, &c);\n    if (a > b && a > c) printf("%d is the largest.\\n", a);\n    else if (b > c) printf("%d is the largest.\\n", b);\n    else printf("%d is the largest.\\n", c);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    int a, b, c;\n    cout << "Enter three numbers: ";\n    cin >> a >> b >> c;\n    if (a > b && a > c) cout << a << " is the largest." << endl;\n    else if (b > c) cout << b << " is the largest." << endl;\n    else cout << c << " is the largest." << endl;\n    return 0;\n}`],["2b. SMALLEST AMONG 3 NUMBERS", "", `#include <stdio.h>\nint main() {\n    int a, b, c;\n    printf("Enter three numbers: ");\n    scanf("%d %d %d", &a, &b, &c);\n    if (a < b && a < c) printf("%d is the smallest.\\n", a);\n    else if (b < c) printf("%d is the smallest.\\n", b);\n    else printf("%d is the smallest.\\n", c);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    int a, b, c;\n    cout << "Enter three numbers: ";\n    cin >> a >> b >> c;\n    if (a < b && a < c) cout << a << " is the smallest." << endl;\n    else if (b < c) cout << b << " is the smallest." << endl;\n    else cout << c << " is the smallest." << endl;\n    return 0;\n}`],["2c. LARGEST & SMALLEST (BOTH)", "", `#include <stdio.h>\nint main() {\n    int a, b, c;\n    printf("Enter three numbers: ");\n    scanf("%d %d %d", &a, &b, &c);\n    if (a > b && a > c) printf("%d is the largest.\\n", a);\n    else if (b > c) printf("%d is the largest.\\n", b);\n    else printf("%d is the largest.\\n", c);\n    if (a < b && a < c) printf("%d is the smallest.\\n", a);\n    else if (b < c) printf("%d is the smallest.\\n", b);\n    else printf("%d is the smallest.\\n", c);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    int a, b, c;\n    cout << "Enter three numbers: ";\n    cin >> a >> b >> c;\n    if (a > b && a > c) cout << a << " is the largest." << endl;\n    else if (b > c) cout << b << " is the largest." << endl;\n    else cout << c << " is the largest." << endl;\n    if (a < b && a < c) cout << a << " is the smallest." << endl;\n    else if (b < c) cout << b << " is the smallest." << endl;\n    else cout << c << " is the smallest." << endl;\n    return 0;\n}`],["3. AVERAGE OF 3 NUMBERS", "", `#include <stdio.h>\nint main() {\n    float a, b, c, avg;\n    printf("Enter three numbers: ");\n    scanf("%f %f %f", &a, &b, &c);\n    avg = (a + b + c) / 3;\n    printf("Average = %.2f\\n", avg);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    float a, b, c, avg;\n    cout << "Enter three numbers: ";\n    cin >> a >> b >> c;\n    avg = (a + b + c) / 3;\n    cout << "Average = " << avg << endl;\n    return 0;\n}`],["4a. RIGHT ANGLE TRIANGLE AREA", "", `#include <stdio.h>\nint main() {\n    float base, height, area;\n    printf("Enter base and height: ");\n    scanf("%f %f", &base, &height);\n    area = (base * height) / 2;\n    printf("Right Angle Triangle Area = %.2f\\n", area);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    float base, height, area;\n    cout << "Enter base and height: ";\n    cin >> base >> height;\n    area = (base * height) / 2;\n    cout << "Right Angle Triangle Area = " << area << endl;\n    return 0;\n}`],["4b. EQUILATERAL TRIANGLE AREA", "", `#include <stdio.h>\nint main() {\n    float a, area;\n    printf("Enter side length: ");\n    scanf("%f", &a);\n    area = (1.7320508f / 4) * a * a;\n    printf("Equilateral Triangle Area = %.2f\\n", area);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    float a, area;\n    cout << "Enter side length: ";\n    cin >> a;\n    area = (1.7320508f / 4) * a * a;\n    cout << "Equilateral Triangle Area = " << area << endl;\n    return 0;\n}`],["4c. SCALENE TRIANGLE AREA", "", `#include <stdio.h>\nint main() {\n    float a, b, c, s, x, area;\n    printf("Enter sides a, b, c: ");\n    scanf("%f %f %f", &a, &b, &c);\n    s = (a + b + c) / 2;\n    x = s * (s - a) * (s - b) * (s - c);\n    float guess = x / 2;\n    for (int i = 0; i < 20; i++) guess = (guess + x / guess) / 2;\n    area = guess;\n    printf("Scalene Triangle Area = %.2f\\n", area);\n    return 0;\n}`, `#include<iostream>\nusing namespace std;\nint main() {\n    float a, b, c, s, x, area;\n    cout << "Enter sides a, b, c: ";\n    cin >> a >> b >> c;\n    s = (a + b + c) / 2;\n    x = s * (s - a) * (s - b) * (s - c);\n    float guess = x / 2;\n    for (int i = 0; i < 20; i++) guess = (guess + x / guess) / 2;\n    area = guess;\n    cout << "Scalene Triangle Area = " << area << endl;\n    return 0;\n}`],["5. CIRCLE AREA & CIRCUMFERENCE", "", `#include <stdio.h>\nint main() {\n    float r, pi = 3.1416f, area, circ;\n    printf("Enter radius: ");\n    scanf("%f", &r);\n    area = pi * r * r;\n    circ = 2 * pi * r;\n    printf("Area          = %.4f Sq M\\n", area);\n    printf("Circumference = %.4f M\\ // =======================================
// UI RENDERING LOGIC
// =======================================
const container = document.getElementById('programs-container');
const menuList = document.getElementById('menuList');
let currentMode = '';

function goHome() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
  container.innerHTML = ''; // Clear memory
  menuList.innerHTML = '';
}

function openMode(mode) {
  currentMode = mode;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  
  let headerLabel = mode === 'C' ? 'C Programs' : (mode === 'CPP' ? 'C++ Programs' : 'C & C++ Side-by-Side');
  document.getElementById('sheetTitle').innerText = headerLabel;

  renderCards();
  document.getElementById('app-screen').scrollTo(0,0);
}

function renderCards() {
  container.innerHTML = '';
  menuList.innerHTML = '';

  data.forEach((prog, i) => {
    const hasPat = prog[1] !== "";
    const progId = `prog-${i}`;
    let cardContent = '';

    if (currentMode === 'C' || currentMode === 'CPP') {
      const codeIndex = currentMode === 'C' ? 2 : 3;
      const langClass = currentMode === 'C' ? 'language-c' : 'language-cpp';
      const safeCode = prog[codeIndex].replace(/</g, "&lt;").replace(/>/g, "&gt;");

      cardContent = `
        <header>
          <div class="title">${prog[0]}</div>
          <button class="copy-btn" onclick="copyCode(this)">COPY</button>
        </header>
        ${hasPat ? `<div class="pattern-box">${prog[1]}</div>` : ''}
        <div class="code-area">
          <pre><code class="${langClass}">${safeCode}</code></pre>
        </div>
      `;
    } 
    else if (currentMode === 'BOTH') {
      const safeC = prog[2].replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const safeCPP = prog[3].replace(/</g, "&lt;").replace(/>/g, "&gt;");
      
      cardContent = `
        <header>
          <div class="title">${prog[0]}</div>
        </header>
        ${hasPat ? `<div class="pattern-box">${prog[1]}</div>` : ''}
        <div class="view-container">
          <div class="code-pane">
            <div class="pane-header">C Code <button class="copy-btn" onclick="copyCode(this)">COPY</button></div>
            <div class="code-area"><pre><code class="language-c">${safeC}</code></pre></div>
          </div>
          <div class="code-pane">
            <div class="pane-header">C++ Code <button class="copy-btn" onclick="copyCode(this)">COPY</button></div>
            <div class="code-area"><pre><code class="language-cpp">${safeCPP}</code></pre></div>
          </div>
        </div>
      `;
    }

    const html = `<div class="snap-section" id="${progId}"><div class="card">${cardContent}</div></div>`;
    container.insertAdjacentHTML('beforeend', html);

    // Populate Navigation Menu
    const li = document.createElement('li');
    li.innerText = prog[0];
    li.onclick = () => { document.getElementById(progId).scrollIntoView(); toggleMenu(); };
    menuList.appendChild(li);
  });

  const completeHtml = `
    <div class="snap-section intro">
      <h1 style="color: #10b981;">COMPLETE!</h1>
      <p>End of ${currentMode} collection.</p>
    </div>`;
  container.insertAdjacentHTML('beforeend', completeHtml);

  hljs.highlightAll();
}

// =======================================
// FONT SIZE ENGINE
// =======================================
const fontSizes =['small', 'medium', 'large'];
const fontLabels = { 'small': 'A-', 'medium': 'Aa', 'large': 'A+' };
let currentFontIndex = 1;

function toggleFontSize() {
  currentFontIndex = (currentFontIndex + 1) % fontSizes.length;
  const newSize = fontSizes[currentFontIndex];
  document.documentElement.setAttribute('data-font', newSize);
  localStorage.setItem('fontSize', newSize);
  document.getElementById('fontBtn').innerText = fontLabels[newSize];
}

(function initFont() {
  const savedSize = localStorage.getItem('fontSize') || 'medium';
  currentFontIndex = fontSizes.indexOf(savedSize) > -1 ? fontSizes.indexOf(savedSize) : 1;
  document.documentElement.setAttribute('data-font', savedSize);
  document.getElementById('fontBtn').innerText = fontLabels[savedSize];
})();


// =======================================
// THEME ENGINE
// =======================================
function toggleTheme() {
  const root = document.documentElement;
  const newTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
}

(function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = savedTheme ? savedTheme : (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
})();

// =======================================
// UTILS
// =======================================
function toggleMenu() {
  document.getElementById('sheet').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}

function copyCode(btn) {
  const code = btn.closest('.code-pane') 
      ? btn.closest('.code-pane').querySelector('code').innerText 
      : btn.closest('.card').querySelector('code').innerText;
  
  const showSuccess = () => {
    btn.innerText = 'COPIED!'; btn.classList.add('success');
    setTimeout(() => { btn.innerText = 'COPY'; btn.classList.remove('success'); }, 2000);
  };
  const showError = () => {
    btn.innerText = 'FAILED'; btn.style.backgroundColor = '#dc2626';
    setTimeout(() => { btn.innerText = 'COPY'; btn.style.backgroundColor = ''; }, 2000);
  };

  const fallbackCopy = () => {
    const ta = document.createElement("textarea");
    ta.value = code; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy') ? showSuccess() : showError(); } catch(e) { showError(); }
    document.body.removeChild(ta);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(code).then(showSuccess).catch(fallbackCopy);
  } else fallbackCopy();
}
</script>
